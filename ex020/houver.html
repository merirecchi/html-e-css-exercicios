<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de houver</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: white;
            background-color: blue;
            width: 150px;
        }
        
        div:hover {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de HOVER</h1>
    <P>Passe o mouse sobre o texto abaixo.</P>
    <div>Passe o mouse aqui.
        <P> Texto escondido</P>
    </div>

<p>Fim do exmplo</p>

    
</body>
</html>
